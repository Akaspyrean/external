parsers:
  - reg: ^https?://.+
    code: |
      /**
       * Mihomo 内核版 Clash 配置预处理器
       * =================================================================
       * 1. 作用：接管订阅的分流架构与策略配置。
       * 2. 核心：
       *    - 特征识别：正则驱动的节点自动化分组。
       *    - 动态更新：集成云端规则集，分流策略实时同步。
       *    - 性能优化：OneDrive 进程级直连，保障极致速率。
       * 3. 部署：粘贴至 Settings -> Parsers，刷新订阅生效。
       * =================================================================
       */

      module.exports.parse = async (raw, { yaml }) => {
        const rawConfig = yaml.parse(raw);
        const proxies = rawConfig.proxies || [];
        const allNames = proxies.map(p => p.name);

        // ── 节点特征匹配
        const regDedicated = /(专线|IPLC|IEPL|BGP|AIA)/i;

        // ── 节点分组切割
        const dedicatedNames = allNames.filter(n => regDedicated.test(n));
        const normalNames = allNames.filter(n => !regDedicated.test(n));

        // ── 空值容灾兜底
        const safeProxies = (arr) => arr.length > 0 ? arr : ["DIRECT"];
        const finalDedicated = safeProxies(dedicatedNames);
        const finalNormal = safeProxies(normalNames);

        const config = {
          "mixed-port": 7890,
          "allow-lan": true,
          "log-level": "error",
          "ipv6": false,
          "geodata-mode": true,
          "geodata-loader": "standard",
          "find-process-mode": "strict",

          // ── 流量嗅探
          "sniffer": {
            "enable": true,
            "sniff": {
              "TLS": { "ports": [443, 8443] },
              "HTTP": { "ports": [80, "8080-8880"], "override-destination": true }
            }
          },

          "proxies": proxies,

          // ── DNS 解析架构
          "dns": {
            "enable": true,
            "listen": "0.0.0.0:9053",
            "ipv6": false,
            "enhanced-mode": "fake-ip",
            "fake-ip-range": "198.18.0.1/16",
            "fake-ip-filter": ["+.lan", "+.local", "+.home.arpa", "localhost.ptlogin2.qq.com", "+.msftconnecttest.com", "+.msftncsi.com", "+.gstatic.com", "*.n.n.srv.nintendo.net"],
            "default-nameserver": ["223.5.5.5", "119.29.29.29"],
            "nameserver": ["223.5.5.5", "119.29.29.29"]
          },

          // ── 策略层级配置
          "proxy-groups": [
            { "name": "节点选择", "type": "select", "proxies": ["专线优选", "普通优选", "手动选择", "DIRECT"] },
            { "name": "人工智能", "type": "select", "proxies": ["专线优选", "普通优选", "手动选择"] },
            { "name": "影音视听", "type": "select", "proxies": ["专线优选", "普通优选", "手动选择"] },
            { "name": "手动选择", "type": "select", "proxies": allNames.length > 0 ? allNames : ["DIRECT"] },
            
            { "name": "专线优选", "type": "url-test", "url": "http://www.gstatic.com/generate_204", "interval": 300, "tolerance": 50, "lazy": true, "proxies": finalDedicated },
            { "name": "普通优选", "type": "url-test", "url": "http://www.gstatic.com/generate_204", "interval": 300, "tolerance": 50, "lazy": true, "proxies": finalNormal }
          ],

          // ── 外部规则订阅
          "rule-providers": {
            "direct": { "type": "http", "behavior": "classical", "url": "https://raw.githubusercontent.com/Akaspyrean/external/main/rules/direct.yaml", "path": "./rules/direct.yaml", "interval": 86400 },
            "ai": { "type": "http", "behavior": "classical", "url": "https://raw.githubusercontent.com/Akaspyrean/external/main/rules/ai.yaml", "path": "./rules/ai.yaml", "interval": 86400 },
            "media": { "type": "http", "behavior": "classical", "url": "https://raw.githubusercontent.com/Akaspyrean/external/main/rules/media.yaml", "path": "./rules/media.yaml", "interval": 86400 },
            "proxy": { "type": "http", "behavior": "classical", "url": "https://raw.githubusercontent.com/Akaspyrean/external/main/rules/proxy.yaml", "path": "./rules/proxy.yaml", "interval": 86400 }
          },

          // ── 分流规则映射
          "rules": [
            "GEOSITE,private,DIRECT",
            "RULE-SET,direct,DIRECT",
            "GEOSITE,category-ads-all,REJECT",
            
            "PROCESS-NAME,OneDrive.exe,DIRECT",
            "PROCESS-NAME,OneDrive,DIRECT",
            "DOMAIN-SUFFIX,onedrive.live.com,节点选择",
            "DOMAIN-SUFFIX,sharepoint.com,DIRECT",

            "RULE-SET,ai,人工智能",
            "RULE-SET,media,影音视听",
            "RULE-SET,proxy,节点选择",
            
            "GEOSITE,cn,DIRECT",
            "GEOIP,CN,DIRECT",
            "MATCH,节点选择"
          ]
        };

        return yaml.stringify(config);
      };
